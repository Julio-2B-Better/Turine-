<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Criar Conta - TuriNE</title>


<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />


<link rel="stylesheet" href="cadastro.css" />
</head>

<body>
<header class="topo">
    <div class="area-logo">
        <img src="turine_logo.png" width="120" height="35">
        <span class="marca">Turi-NE</span>
    </div>
</header>

<div class="card">

    <h1>Cadastrar Usuário</h1>
    <p class="sub">Insira as informações solicitadas</p>

    <div class="form-grid">

        <div class="coluna">
            <div class="input-box">
                <label>Nome completo</label>
                <input type="text" placeholder="Nome completo">
            </div>

            <div class="input-box">
                <label>Nome de Usuário</label>
                <input type="text" placeholder="Nome de usuário">
            </div>

            <div class="input-box">
                <label>CPF</label>
                <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">
            </div>

            <div class="input-box">
                <label>Data de Nascimento</label>
                    <div class="data-grid">
                        <select>
                            <option>Dia</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                            <option>6</option>
                            <option>7</option>
                            <option>8</option>
                            <option>9</option>
                            <option>10</option>
                            <option>11</option>
                            <option>12</option>
                            <option>13</option>
                            <option>14</option>
                            <option>15</option>
                            <option>16</option>
                            <option>17</option>
                            <option>18</option>
                            <option>19</option>
                            <option>20</option>
                            <option>21</option>
                            <option>22</option>
                            <option>23</option>
                            <option>24</option>
                            <option>25</option>
                            <option>26</option>
                            <option>27</option>
                            <option>28</option>
                            <option>29</option>
                            <option>30</option>
                            <option>31</option>
                        </select>

                        <select>
                            <option>Mês</option>
                            <option>Janeiro</option>
                            <option>Fevereiro</option>
                            <option>Março</option>
                            <option>Abril</option>
                            <option>Maio</option>
                            <option>Junho</option>
                            <option>Julho</option>
                            <option>Agosto</option>
                            <option>Setembro</option>
                            <option>Outubro</option>
                            <option>Novembro</option>
                            <option>Dezembro</option>
                        </select>

                        <select>
                            <option>Ano</option>
                            <option>2024</option>
                            <option>2025</option>
                            <option>2026</option>
                        </select>
                    </div>
            </div>

            <div class="input-box">
                <div class="input-box">
                <label>Gênero</label>
                <select class="select-genero">
                    <option value="">Selecione</option>
                    <option value="feminino">Feminino</option>
                    <option value="masculino">Masculino</option>
                    <option value="nao-binario">Não binário</option>
                    <option value="nao">Prefiro não declarar</option>
                </select>
                </div>
            </div>
        </div>

        <div class="linha"></div>

        <div class="coluna">
            <div class="input-box">
                <label>E-mail</label>
                <input type="text" placeholder="Digite seu E-mail">
            </div>

            <div class="input-box">
                <label>Confirme seu E-mail</label>
                <input type="text" placeholder="Confirme seu E-mail">
            </div>

            <div class="input-box">
                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha">
            </div>

            <div class="input-box">
                <label>Confirme sua senha</label>
                <input type="password" placeholder="Confirme sua senha">
            </div>
        </div>

    </div>

    <p class="bemvindo">Seja bem-vindo ao Turi-NE!</p>

    <button class="btn">Finalizar Cadastro</button>

</div>

<footer class="rodape">
    2026 - Turi-NE
</footer>
</body>
</html>
