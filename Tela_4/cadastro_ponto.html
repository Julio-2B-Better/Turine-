<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Empresa</title>

    <link rel="stylesheet" href="cadastro_ponto.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo-area">
            <img src="/Imagem_site/turine_logo.png" alt="Logo">
        </div>
    </header>

    <!-- CONTAINER -->
    <div class="container">

        <h2>Cadastrar Empresa</h2>
        <p class="sub">Insira as informações solicitadas</p>

        <div class="form-grid">

            <!-- COLUNA ESQUERDA -->
            <div class="col">
                <label>Nome empresa</label>
                <input type="text">

                <label>Nome fantasia</label>
                <input type="text">

                <label>CNPJ</label>
                <input type="text">

                <label>Inscrição Estadual * (se tiver)</label>
                <input type="text">

                <label>Data de Fundação</label>
                <input type="date">
            </div>

            <!-- COLUNA DIREITA -->
            <div class="col">
                <label>E-mail Corporativo</label>
                <input type="email">

                <label>Telefone</label>
                <input type="text">

                <label>Site</label>
                <input type="text">

                <label>CEP</label>
                <input type="text">
            </div>

        </div>

        <button class="btn">Próxima etapa</button>

    </div>

</body>
<footer>
    <p>&copy; 2025 TuriNE. Todos os direitos reservados.</p>
</footer>
</html>
