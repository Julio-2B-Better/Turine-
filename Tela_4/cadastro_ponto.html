<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Empresa</title>

    <link rel="stylesheet" href="cadastro_ponto.css">
</head>

<body>

    
    <header class="header">
        <div class="logo-area">
            <img src="/Imagem_site/turine_logo.png" alt="Logo">
        </div>
    </header>

   
    <div class="container">

        <h2>Cadastrar Empresa</h2>
        <p class="sub">Insira as informações solicitadas</p>

        <div class="form-grid">

            
            <div class="coluna">
                <label>Nome empresa</label>
                <input type="text" placeholder="Insira o nome da empresa">

                <label>Nome fantasia</label>
                <input type="text" placeholder="Insira o nome fantasia">

                <label>CNPJ</label>
                <input type="text" maxlength="14" placeholder="00.000.000/0000-00">

                <label>Inscrição Estadual * (Opcional)</label>
                <input type="text" placeholder="Insira a inscção estadual">

                <label>Data de Fundação</label>
                <input type="date">
            </div>

            
            <div class="coluna">
                <label>E-mail Corporativo</label>
                <input type="email" placeholder="Insira o E-mail">

                <label>Telefone</label>
                <input type="text" placeholder="+00 00 00000-0000">

                <label>Site</label>
                <input type="url" placeholder="Insira o link do seu site">

                <label>CEP</label>
                <input type="text" placeholder="Insira o endereço da empresa">
            </div>

        </div>

        <button class="btn">Próxima etapa</button>

    </div>
<footer class="rodape">
    <p>2026 - TuriNE.</p>
</footer>
</body>
</html>
