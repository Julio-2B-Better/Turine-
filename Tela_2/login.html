<header>

        <img src="" width="120" height="35">

<div class="login-card">

    <h2>Faça o Login ou Crie uma conta:</h2>
    <p class="sub">Você pode efetuar seu Login com sua conta Google</p>

    <div class="input-box">
        <label>E-mail ou Usuário</label>
        <input type="text" placeholder="Insira seu E-mail">
    </div>

    <div class="input-box">
        <label>Senha</label>
        <input type="password" placeholder="Insira sua senha">
    </div>

    <div class="btn-area">
        <button class="btn entrar">Acessar</button>
        <button class="btn criar">Criar conta</button>
    </div>

    <p class="senha">Esqueceu sua senha?<br>
        <a href="#">Clique aqui</a>
    </p>

    <div class="google">
        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
    </div>

</div>
