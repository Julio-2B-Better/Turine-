<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - TuriNE</title>

    <link rel="stylesheet" href="login.css" />
</head>

<body>

<!-- LOGO CENTRAL -->
<header class="topo">
    <a href="/Tela_1/pagina_inicial.html">
            <img src="/Imagem_site/turine_logo.png" alt="Logo">
            </a>
</header>

<!-- CARD LOGIN -->
<div class="login-card">

    <h2>Faça o Login ou Crie uma conta:</h2>
    <p class="sub">Você pode efetuar seu Login com sua conta Google</p>

    <div class="input-box">
        <label>E-mail ou Usuário</label>
        <input type="text" placeholder="Insira seu E-mail">
    </div>

    <div class="input-box">
        <label>Senha</label>
        <input type="password" placeholder="Insira sua senha">
    </div>

    <div class="btn-area">
        <button class="btn entrar">Acessar</button>
        <a class="btn criar" href="/Tela_3/cadastro.html">Criar conta</a>
    </div>

    <p class="senha">Esqueceu sua senha?<br>
        <a href="#">Clique aqui</a>
    </p>

    <div class="google">
        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
    </div>

</div>

</body>
</html>
